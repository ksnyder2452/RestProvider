name: Java Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests
        run: mvn -B -ntp -f java-server/pom.xml test

      - name: Generate Javadocs
        run: mvn -B -ntp -f java-server/pom.xml -DskipTests javadoc:javadoc

      - name: Verify JavadocController docs path
        run: |
          test -f java-server/target/reports/apidocs/index.html

      - name: Upload Javadocs artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-javadocs
          path: java-server/target/reports/apidocs
          if-no-files-found: error
